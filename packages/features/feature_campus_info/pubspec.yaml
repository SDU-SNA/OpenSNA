name: feature_campus_info
description: 校园资讯功能模块，包含公告、新闻、搜索和收藏功能
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.5.0'

dependencies:
  flutter:
    sdk: flutter

  # Core 层依赖
  core_network:
    path: ../../core/core_network
  core_storage:
    path: ../../core/core_storage
  core_ui:
    path: ../../core/core_ui
  core_utils:
    path: ../../core/core_utils

  # 状态管理
  flutter_riverpod: ^2.4.0

  # UI
  cached_network_image: ^3.3.0

  # 工具
  intl: ^0.20.2
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  mockito: ^5.4.0
