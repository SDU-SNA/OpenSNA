name: core_auth
description: 认证层核心包，提供统一的用户认证和授权管理
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Core 依赖
  core_network:
    path: ../core_network
  core_storage:
    path: ../core_storage
  
  # JWT 处理
  jwt_decoder: ^2.0.1
  
  # 状态管理
  flutter_riverpod: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
