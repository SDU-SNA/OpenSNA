name: core_network
description: 网络层核心包，提供统一的网络请求、拦截器和错误处理
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # 网络请求
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.0
  cookie_jar: ^4.0.8
  
  # 日志（使用Toolkit包）
  log_kit:
    git:
      url: https://github.com/h1s97x/LogKit.git
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
