name: feature_auth
description: Authentication feature package for SDU-SNA application
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core packages
  core_network:
    path: ../../core/core_network
  core_storage:
    path: ../../core/core_storage
  core_auth:
    path: ../../core/core_auth
  core_ui:
    path: ../../core/core_ui
  core_router:
    path: ../../core/core_router
  core_utils:
    path: ../../core/core_utils
  
  # State management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Code generation
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  freezed: ^2.4.5
  json_serializable: ^6.7.0
  
  # Testing
  mockito: ^5.4.0
