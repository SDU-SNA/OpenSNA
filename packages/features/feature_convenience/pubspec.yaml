name: feature_convenience
description: 便民服务功能模块，包含教室查询、图书馆服务和校车服务
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.5.0'

dependencies:
  flutter:
    sdk: flutter

  core_network:
    path: ../../core/core_network
  core_ui:
    path: ../../core/core_ui
  core_utils:
    path: ../../core/core_utils

  flutter_riverpod: ^2.4.0
  intl: ^0.20.2
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
